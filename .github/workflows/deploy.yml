name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
# Grant the workflow write access to repo contents so it can push the built
# site to the gh-pages branch — no repo-level settings change required.
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
